<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>期末复习系统 - 错题与收藏增强版</title>
    <!-- 引入 Tailwind CSS 进行快速样式还原 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 修复锚点跳转被顶部导航遮挡的问题，并加入平滑滚动 */
        html {
            scroll-behavior: smooth;
            scroll-padding-top: 80px; 
            /* 移除移动端点击时的蓝色高亮背景 */
            -webkit-tap-highlight-color: transparent;
        }
        /* 自定义部分主题色与字体 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f2f4f7;
        }
        /* 顶部导航深蓝色 */
        .top-nav { background-color: #3b4b6b; }
        /* 绿色对号和字体色 */
        .text-success { color: #1dc385; }
        /* 右侧答题卡格子颜色 */
        .grid-item {
            background-color: #e8f1ff;
            color: #3b82f6;
            border: 1px solid #b5ccf9;
            transition: all 0.2s;
        }
        .grid-item:hover {
            background-color: #3b82f6;
            color: white;
        }
        /* 刷题模式下作答正确的格子颜色 (绿色) */
        .grid-item.answered-correct {
            background-color: #1dc385;
            color: white;
            border-color: #1dc385;
        }
        /* 刷题模式下作答错误的格子颜色 (红色) */
        .grid-item.answered-wrong {
            background-color: #ef4444; 
            color: white;
            border-color: #ef4444;
        }
        /* 隐藏滚动条但保留滚动功能 (针对全局) */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background-color: #d1d5db;
            border-radius: 3px;
        }
        /* 定制右侧导航栏的滚动条 */
        #nav-sidebar::-webkit-scrollbar {
            width: 8px;
        }
        #nav-sidebar::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 4px;
        }
        #nav-sidebar::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        #nav-sidebar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
        
        /* 锁定状态下的选项（不可点击） */
        .option-locked {
            pointer-events: none;
        }

        /* 移动端辅助样式 */
        .js-hidden { display: none !important; }
        
        @media (max-width: 640px) {
            .mobile-hide { display: none !important; }
        }
    </style>
</head>
<body class="text-[#333]">

    <!-- 顶部导航栏 (全局共享) -->

答案：C</textarea>

    <!-- ================= 纯本地存储核心逻辑 (IndexedDB) ================= -->
    <script>
        // --- 状态管理 ---
        let localDB = null;
        let testsData = []; 
        let currentTestId = null;
        let currentMode = 'practice'; // 'practice' | 'recite' 全局模式控制
        let currentFilter = 'all';    // 'all' | 'wrong' | 'favorite' 题目过滤模式

        // --- DOM 元素引用 ---
        const views = {
            dashboard: document.getElementById('dashboard-view'),
            collectionList: document.getElementById('collection-list-view'),
            input: document.getElementById('input-view'),
            review: document.getElementById('review-view')
        };
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingText = document.getElementById('loading-text');
        const topNavTitle = document.getElementById('top-nav-title');
        const navBackBtn = document.getElementById('nav-back-btn');
        const navBackText = document.getElementById('nav-back-text');
        const navStatsContainer = document.getElementById('nav-stats-container');
        const accuracyDisplay = document.getElementById('accuracy-display');
        const modePracticeBtn = document.getElementById('mode-practice-btn');
        const modeReciteBtn = document.getElementById('mode-recite-btn');
        const backToTopBtn = document.getElementById('back-to-top');

        // --- 抽屉导航栏引用及逻辑 ---
        const sidebarToggleBtn = document.getElementById('sidebar-toggle-btn');
        const sidebarCloseBtn = document.getElementById('sidebar-close-btn');
        const sidebarOverlay = document.getElementById('sidebar-overlay');
        const navSidebar = document.getElementById('nav-sidebar');

        window.openSidebar = function() {
            navSidebar.classList.remove('translate-x-full');
            sidebarOverlay.classList.remove('js-hidden');
            setTimeout(() => sidebarOverlay.classList.remove('opacity-0'), 10);
            sidebarToggleBtn.classList.add('js-hidden');
        };

        window.closeSidebar = function() {
            navSidebar.classList.add('translate-x-full');
            sidebarOverlay.classList.add('opacity-0');
            setTimeout(() => sidebarOverlay.classList.add('js-hidden'), 300);
            setTimeout(() => sidebarToggleBtn.classList.remove('js-hidden'), 300);
        };

        if(sidebarToggleBtn) sidebarToggleBtn.addEventListener('click', window.openSidebar);
        if(sidebarCloseBtn) sidebarCloseBtn.addEventListener('click', window.closeSidebar);
        if(sidebarOverlay) sidebarOverlay.addEventListener('click', window.closeSidebar);

        // --- 全局加载动画控制 ---
        function showLoading(text) {

        // --- 本地数据库 (IndexedDB) 初始化与操作 ---
        async function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('QuizReviewDB', 2); 
                
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains('tests')) {
                        db.createObjectStore('tests', { keyPath: 'id' });
                    }
                };
                
                request.onsuccess = (event) => {
                    localDB = event.target.result;
                    resolve();
                };
                request.onerror = (event) => reject(event.target.error);
            });
        }

        async function loadTests() {
            return new Promise((resolve, reject) => {
                if (!localDB) return resolve();
                const transaction = localDB.transaction(['tests'], 'readonly');
                const store = transaction.objectStore('tests');
                const request = store.getAll();
                
                request.onsuccess = () => {
                    testsData = request.result || [];
                    
                    // 兼容旧数据结构
                    testsData = testsData.filter(t => t.id !== 'wrong_book');
                    testsData.forEach(t => {
                        if (!t.wrongIds) t.wrongIds = [];
                        if (!t.favoriteIds) t.favoriteIds = [];
                        if (!t.answers) t.answers = {};
                    });

                    // 降序排序
                    testsData.sort((a, b) => b.createdAt - a.createdAt);
                    resolve();
                };
                request.onerror = () => reject(request.error);
            });
        }

        async function saveFullTest(testObj) {
            return new Promise((resolve, reject) => {
                const transaction = localDB.transaction(['tests'], 'readwrite');
                const store = transaction.objectStore('tests');
                const request = store.put(testObj);
                request.onsuccess = () => resolve(testObj.id);
                request.onerror = () => reject(request.error);
            });
        }

        async function deleteTest(testId) {
            testsData = testsData.filter(t => t.id !== testId);
            return new Promise((resolve, reject) => {
                const transaction = localDB.transaction(['tests'], 'readwrite');
                const store = transaction.objectStore('tests');
                const request = store.delete(testId);
                request.onsuccess = () => {
                    renderDashboard();
                    resolve();
                };
                request.onerror = () => reject(request.error);
            });
        }

        // --- 应用启动 ---
        async function initApp() {
            try {
                await initDB();
                await loadTests();
                hideLoading();
                showView('dashboard');
            } catch (error) {
                console.error("本地数据库初始化失败:", error);
                alert("无法连接到浏览器的本地数据库，您的数据可能无法永久保存，请检查浏览器无痕模式等设置。");
                hideLoading();
                showView('dashboard');
            }
        }

        // --- 核心解析逻辑 ---
        function parseText(text) {
            const questions = [];
            text = text.replace(/\u00a0/g, ' '); 
            
            const blocks = ('\n' + text).split(/\n(?=\s*\d+[\.、])/).filter(b => b.trim());
            let globalIdCounter = 1; 

            blocks.forEach((block) => {
                block = block.trim();
                if (!/^\d+[\.、]/.test(block)) return;

                let answer = '';
                let analysis = '';
                
                const ansMatch = block.match(/(?:【答案】|参考答案[：:]?|答案[：:]?)\s*([A-D√×]+)/i);
                if (ansMatch) answer = ansMatch[1].trim().toUpperCase();

                const analysisMatch = block.match(/(?:【解析】|参考解析[：:]?|解析[：:]?)\s*([\s\S]*)$/i);
                if (analysisMatch) analysis = analysisMatch[1].trim();

                let cleanBlock = block.replace(/\n?\s*(?:【答案】|参考答案[：:]?|答案[：:]?)[\s\S]*/i, '').trim();

                const options = [];
                const optionRegex = /([A-D])[\.、]\s*(.*?)(?=\n\s*[A-D][\.、]|$)/gs;
                let optMatch;
                let hasOptions = false;

                while ((optMatch = optionRegex.exec(cleanBlock)) !== null) {
                    hasOptions = true;
                    options.push(`${optMatch[1].toUpperCase()}. ${optMatch[2].trim()}`);
                }

                let qText = cleanBlock;
                if (hasOptions) {
                    qText = cleanBlock.split(/\n\s*[A-D][\.、]/i)[0].trim();
                }
                
                qText = qText.replace(/^\d+[\.、]\s*/, '').trim();

                if (!answer && !hasOptions) return;

                questions.push({
                    id: globalIdCounter++, 
                    type: hasOptions ? '单选题' : '判断题',
                    text: qText,
                    options: options,
                    answer: answer,
                    analysis: analysis
                });
            });

            return questions;
        }

        // --- 计算当前筛选集下的统计信息 ---
        function calculateStats(test, displayQuestions) {
            const total = displayQuestions.length;
            const answers = test.answers || {};
            
            let answeredCount = 0;
            let correctCount = 0;

            displayQuestions.forEach(q => {
                if (answers[q.id]) {
                    answeredCount++;
                    const isCorrect = q.answer.includes(answers[q.id]) && q.answer.length === 1;
                    if (isCorrect) correctCount++;
                }
            });

            const accuracy = answeredCount === 0 ? 0 : Math.round((correctCount / answeredCount) * 100);
            return { total, answeredCount, correctCount, accuracy };
        }

        function updateStatsUI(test, displayQuestions) {
            const stats = calculateStats(test, displayQuestions);
            accuracyDisplay.innerText = `正确率: ${stats.accuracy}% (${stats.correctCount}/${stats.answeredCount})`;
            document.getElementById('sidebar-progress').innerText = `${stats.answeredCount}/${stats.total}`;
        }

            if (!test) return;
            currentTestId = testId;

            let displayQuestions = test.questions;
            if (currentFilter === 'wrong') {
                displayQuestions = test.questions.filter(q => test.wrongIds.includes(q.id));

            if (currentMode === 'practice') {
                modePracticeBtn.className = 'flex-1 sm:flex-none px-4 md:px-5 py-2 md:py-1.5 text-sm rounded bg-white shadow-sm font-bold text-blue-600 transition-all';
                modeReciteBtn.className = 'flex-1 sm:flex-none px-4 md:px-5 py-2 md:py-1.5 text-sm rounded font-medium text-gray-500 hover:text-gray-700 transition-all bg-gray-100 border border-transparent';
                navStatsContainer.classList.remove('js-hidden');
                updateStatsUI(test, displayQuestions);
            } else {
                modeReciteBtn.className = 'flex-1 sm:flex-none px-4 md:px-5 py-2 md:py-1.5 text-sm rounded bg-white shadow-sm font-bold text-blue-600 transition-all';
                modePracticeBtn.className = 'flex-1 sm:flex-none px-4 md:px-5 py-2 md:py-1.5 text-sm rounded font-medium text-gray-500 hover:text-gray-700 transition-all bg-gray-100 border border-transparent';
                navStatsContainer.classList.add('js-hidden');
                document.getElementById('sidebar-progress').innerText = `共 ${displayQuestions.length} 题`;
            }

            topNavTitle.innerText = test.name;
            document.getElementById('review-test-name').innerText = test.name;
            document.getElementById('total-q-count').innerText = displayQuestions.length;
            document.getElementById('created-date-display').innerText = new Date(test.createdAt).toLocaleDateString();
            
            navBackBtn.classList.remove('js-hidden');
            navBackText.innerText = currentFilter === 'all' ? '返回首页' : (currentFilter === 'wrong' ? '错题分类' : '收藏分类');
            navBackBtn.onclick = () => {
                window.closeSidebar(); // 确保离开时关闭抽屉
                if (currentFilter === 'all') showView('dashboard');
                else openCollectionList(currentFilter);
            };

            const filterBadge = document.getElementById('review-filter-badge');
            if (currentFilter === 'all') {
                filterBadge.classList.add('js-hidden');
            } else {
                filterBadge.classList.remove('js-hidden');
                filterBadge.innerHTML = currentFilter === 'wrong' 
                    ? '<span class="text-[11px] md:text-xs px-2 py-1 rounded bg-red-100 text-red-600 font-medium border border-red-200">正在复习：我的错题本</span>'
                    : '<span class="text-[11px] md:text-xs px-2 py-1 rounded bg-yellow-100 text-yellow-700 font-medium border border-yellow-200">正在复习：我的收藏夹</span>';
            }

            const qContainer = document.getElementById('questions-container');
            const gContainer = document.getElementById('grid-container');
            
            // 核心优化：使用数组拼接后一次性赋值，彻底消除卡顿
            if (displayQuestions.length === 0) {
                qContainer.innerHTML = `<div class="text-center py-20 text-gray-400">当前分类下没有题目哦！</div>`;
                gContainer.innerHTML = '';
            } else {
                const qHtmlArr = [];
                const gHtmlArr = [];
                
                displayQuestions.forEach((q, i) => {
                    const isFav = test.favoriteIds.includes(q.id);
                    qHtmlArr.push(generateQuestionHTML(q, i + 1, currentMode, test.answers[q.id], isFav, currentFilter));
                    
                    let statusClass = '';
                    if (currentMode === 'practice' && test.answers[q.id]) {
                        const isCorrect = q.answer.includes(test.answers[q.id]) && q.answer.length === 1;
                        statusClass = isCorrect ? 'answered-correct' : 'answered-wrong';
                    }

                    gHtmlArr.push(`
                        <div onclick="document.getElementById('q-${q.id}').scrollIntoView({behavior: 'smooth', block: 'center'}); if(window.innerWidth < 1024) window.closeSidebar();" class="grid-item w-full aspect-square flex items-center justify-center text-[12px] md:text-[13px] rounded-sm cursor-pointer ${statusClass} shadow-sm font-medium">
                            ${i + 1}
                        </div>
                    `);
                });
                
                qContainer.innerHTML = qHtmlArr.join('');
                gContainer.innerHTML = gHtmlArr.join('');
            }

            showView('review');
        }

        // --- 事件监听绑定 ---

        document.getElementById('create-new-btn').addEventListener('click', () => {
            document.getElementById('test-name-input').value = '';
            document.getElementById('raw-text').value = ''; // 可选：清空上次粘贴的内容
            showView('input');
        });

        // 模式切换
        modePracticeBtn.addEventListener('click', () => {
            if (currentMode !== 'practice') {
                showLoading('正在切换到刷题模式...');
                setTimeout(() => {
                    currentMode = 'practice';
                    renderReviewTest(currentTestId);
                    hideLoading();
                }, 30);
            }
        });
        
        modeReciteBtn.addEventListener('click', () => {
            if (currentMode !== 'recite') {
                showLoading('正在切换到背题模式...');
                setTimeout(() => {
                    currentMode = 'recite';
                    renderReviewTest(currentTestId);
                    hideLoading();
                }, 30);
            }
        });

        // 局部重置进度
        document.getElementById('reset-progress-btn').addEventListener('click', async () => {
            const scopeText = currentFilter === 'all' ? '全部题目' : (currentFilter === 'wrong' ? '错题本' : '收藏夹');
            if (!confirm(`确定要清空【${scopeText}】的做题记录吗？\n(收藏和错题记录本身不会被删除)`)) return;
            
            showLoading("正在重置...");
            setTimeout(async () => {
                const test = testsData.find(t => t.id === currentTestId);
                if (test) {
                    let targetIds = test.questions.map(q => q.id);
                    if (currentFilter === 'wrong') targetIds = test.wrongIds;
                    else if (currentFilter === 'favorite') targetIds = test.favoriteIds;

                    targetIds.forEach(id => {
                        delete test.answers[id];
                    });

                    await saveFullTest(test);
                    renderReviewTest(test.id);
                }
                hideLoading();
            }, 30);
        });

        document.getElementById('generate-btn').addEventListener('click', async () => {
            const nameInput = document.getElementById('test-name-input').value.trim();
            if (!nameInput) return alert("请输入题库名称！");

            const text = document.getElementById('raw-text').value;
            if (!text.trim()) return alert("请输入题目内容！");

            showLoading("正在解析题目...");
            
            setTimeout(async () => {
                const questions = parseText(text);
                if (questions.length === 0) {
                    hideLoading();
                    alert("未能解析出题目，请检查格式。");
                    return;
                }
                
                const testData = {
                    name: nameInput,
                    questions: questions,
                    answers: {},
                    wrongIds: [],
                    favoriteIds: []
                };

                const newId = await saveFullTest({ ...testData, id: 'test_' + Date.now(), createdAt: Date.now() });
                await loadTests();
                
                // 解析完成后直接进入题库
                currentFilter = 'all';
                currentMode = 'practice';
                renderReviewTest(newId);
                hideLoading();
            }, 50);
        });

        // 处理作答、收藏、移出错题本事件委托 (避免给每个元素绑定事件导致卡顿)
        document.getElementById('questions-container').addEventListener('click', async (e) => {
            const test = testsData.find(t => t.id === currentTestId);
            if (!test) return;

            // 1. 收藏/取消收藏
            const favBtn = e.target.closest('.toggle-fav-btn');
            if (favBtn) {
                const qId = parseInt(favBtn.dataset.qid);
                const isFavIndex = test.favoriteIds.indexOf(qId);
                const svg = favBtn.querySelector('svg');
                
                if (isFavIndex > -1) {
                    test.favoriteIds.splice(isFavIndex, 1);
                    svg.classList.remove('text-yellow-500', 'fill-current');
                    svg.classList.add('text-gray-300', 'group-hover:text-yellow-400');
                    svg.setAttribute('fill', 'none');
                    svg.setAttribute('stroke-width', '2');
                } else {
                    test.favoriteIds.push(qId);
                    svg.classList.remove('text-gray-300', 'group-hover:text-yellow-400');
                    svg.classList.add('text-yellow-500', 'fill-current');
                    svg.setAttribute('fill', 'currentColor');
                    svg.setAttribute('stroke-width', '0');
                }
                await saveFullTest(test);
                return;
            }

            // 2. 移出错题本
            const rmvBtn = e.target.closest('.remove-wq-btn');
            if (rmvBtn) {
                const qId = parseInt(rmvBtn.dataset.qid);
                const wIndex = test.wrongIds.indexOf(qId);
                if (wIndex > -1) {
                    test.wrongIds.splice(wIndex, 1);
                    delete test.answers[qId];
                    await saveFullTest(test);
                    
                    // 局部移除DOM元素，避免整个页面重新渲染闪烁
                    const qDom = document.getElementById(`q-${qId}`);
                    if(qDom) {
                        qDom.style.transition = 'all 0.3s';
                        qDom.style.opacity = '0';
                        qDom.style.height = '0';
                        qDom.style.overflow = 'hidden';
                        qDom.style.padding = '0';
                        qDom.style.margin = '0';
                        setTimeout(() => qDom.remove(), 300);
                    }
                    
                    // 更新数量
                    const countSpan = document.getElementById('total-q-count');
                    countSpan.innerText = parseInt(countSpan.innerText) - 1;
                }
                return;
            }

            // 3. 选项作答
            const optionItem = e.target.closest('.option-item');
            if (!optionItem || currentMode !== 'practice') return;

            const container = optionItem.closest('.options-container');
            if (!container) return;

            const qId = parseInt(container.dataset.qid);
            const correctAns = container.dataset.answer;
            const userAns = optionItem.dataset.val;

            if (test.answers[qId]) return;

            test.answers[qId] = userAns;

            container.querySelectorAll('.option-item').forEach(el => {
                el.classList.remove('bg-blue-50', 'border-blue-300', 'text-blue-600', 'cursor-pointer', 'hover:bg-gray-50', 'bg-white', 'shadow-sm', 'hover:border-gray-300');
                el.classList.add('bg-gray-50', 'border-gray-100', 'opacity-60');
            });
            optionItem.classList.remove('bg-gray-50', 'border-gray-100', 'opacity-60');
            optionItem.classList.add('bg-blue-50', 'border-blue-300', 'text-blue-600');
            container.classList.add('option-locked');

            const resultBox = document.getElementById(`result-${qId}`);
            let isCorrect = false;
            
            if (resultBox) {
                resultBox.classList.remove('hidden'); 
                isCorrect = correctAns.includes(userAns) && correctAns.length === 1; 
                
                const userDisp = resultBox.querySelector('.user-answer-disp');
                const iconCont = resultBox.querySelector('.status-icon-container');
                
                userDisp.textContent = userAns;
                
                if (isCorrect) {
                    userDisp.className = 'font-bold mr-4 md:mr-8 text-green-600 user-answer-disp text-sm md:text-base';
                    resultBox.className = 'mt-4 md:mt-5 bg-green-50 border-green-100 border rounded-md items-center min-h-[48px] md:min-h-[56px] px-4 md:px-6 flex shadow-sm transition-all';
                    iconCont.innerHTML = `<svg class="w-5 h-5 md:w-6 md:h-6 text-success stroke-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg> <span class="hidden md:inline text-[14px] text-gray-800 ml-1">正确</span>`;
                } else {
                    userDisp.className = 'font-bold mr-4 md:mr-8 text-red-500 user-answer-disp text-sm md:text-base';
                    resultBox.className = 'mt-4 md:mt-5 bg-red-50 border-red-100 border rounded-md items-center min-h-[48px] md:min-h-[56px] px-4 md:px-6 flex shadow-sm transition-all';
                    iconCont.innerHTML = `<svg class="w-5 h-5 md:w-6 md:h-6 text-red-500 stroke-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg> <span class="hidden md:inline text-[14px] text-gray-800 ml-1">错误</span>`;

                    if (!test.wrongIds.includes(qId)) {
                        test.wrongIds.push(qId);
                    }
                }
            }

            let displayQuestions = test.questions;
            if (currentFilter === 'wrong') displayQuestions = test.questions.filter(q => test.wrongIds.includes(q.id));
            if (currentFilter === 'favorite') displayQuestions = test.questions.filter(q => test.favoriteIds.includes(q.id));
            
            const displayIndex = displayQuestions.findIndex(x => x.id === qId);
            if (displayIndex !== -1) {
                const gridItem = document.querySelector(`.grid-item:nth-child(${displayIndex + 1})`);
                if (gridItem) {
                    gridItem.classList.remove('answered-correct', 'answered-wrong');
                    gridItem.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');
                }
            }

            updateStatsUI(test, displayQuestions);
            // 异步保存，不阻塞UI线程
            saveFullTest(test);
        });

        // 启动应用
        window.addEventListener('DOMContentLoaded', initApp);

    </script>
</body>
</html>
